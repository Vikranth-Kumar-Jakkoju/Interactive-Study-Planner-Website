<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Study Planner</title>
        <link rel="stylesheet" href="./header.css">
    </head>
    <body>
        <header>
            <!-- Title -->
            <h1 id="title">Study Planner</h1>

            <!-- Links to other pages -->
            <nav>
                <a href="./index.html">Home</a>
                <div id="planner-dropdown">
                    <a href="./planner.html" >Planner</a>
                    <nav>
                        <a href="./batch01.html">Batch 01</a>
                        <a href="./batch02.html">Batch 02</a>
                        <a href="./batch03.html">Batch 03</a>
                    </nav>
                </div>
                <a href="./subjects.html">Subjects</a>
                <a href="./exams.html">Examinations</a>
                <a href="./contact.html">Feedback</a>
            </nav>

            <!-- Login -->
            <div id="login-container">
                <button>Login</button>
            </div>
        </header>
        <h1>Feedback Section</h1>
        <fieldset>
            <legend>Feedback Form</legend>
            <table>
                <tr>
                    <td><label for="name">Name</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label for="name">Email</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label for="name">Message</label></td>
                    <td><textarea name="message" id="message" placeholder="Your feedback goes here ..." rows="5" cols="50"></textarea></td>
                </tr>
            </table>
            <button type="button" id="submit">Submit</button>
        </fieldset>
    </body>
</html>
